<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Canopy — Smart Shade for Outdoor Dining, Automated.</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --orange: #E07A3A;
    --orange-light: #F0955A;
    --orange-dark: #C5652A;
    --teal: #2B6B5E;
    --teal-light: #3A8A79;
    --teal-dark: #1E4D44;
    --cream: #FDF8F2;
    --warm-white: #FFFCF9;
    --gray-100: #F5F0EA;
    --gray-200: #E8E0D5;
    --gray-400: #9E9087;
    --gray-600: #6B5F56;
    --gray-800: #2E2620;
    --text: #1C1712;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--warm-white);
    color: var(--text);
    line-height: 1.6;
    overflow-x: hidden;
  }

  /* ── NAV ── */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 5%;
    height: 68px;
    background: rgba(255,252,249,0.92);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(224,122,58,0.12);
  }

  .nav-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
  }

  .nav-logo-icon {
    width: 34px;
    height: 34px;
    background: var(--orange);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }

  .nav-logo-text {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.3px;
  }

  .nav-links {
    display: flex;
    gap: 36px;
    list-style: none;
  }

  .nav-links a {
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    color: var(--gray-600);
    transition: color 0.2s;
  }

  .nav-links a:hover { color: var(--orange); }

  .nav-cta {
    background: var(--orange);
    color: white !important;
    padding: 9px 22px;
    border-radius: 8px;
    font-weight: 600 !important;
    font-size: 14px !important;
    transition: background 0.2s, transform 0.15s !important;
  }

  .nav-cta:hover {
    background: var(--orange-dark) !important;
    color: white !important;
    transform: translateY(-1px);
  }

  .nav-hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: 4px; }
  .nav-hamburger span { display: block; width: 24px; height: 2px; background: var(--text); border-radius: 2px; }

  /* ── HERO ── */
  .hero {
    min-height: 100vh;
    display: flex;
    align-items: center;
    padding: 100px 5% 80px;
    position: relative;
    overflow: hidden;
    background: var(--cream);
  }

  .hero::before {
    content: '';
    position: absolute;
    top: -200px; right: -200px;
    width: 700px; height: 700px;
    background: radial-gradient(circle, rgba(224,122,58,0.12) 0%, transparent 70%);
    pointer-events: none;
  }

  .hero::after {
    content: '';
    position: absolute;
    bottom: -150px; left: -100px;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(43,107,94,0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  .hero-inner {
    max-width: 1200px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 80px;
    align-items: center;
    width: 100%;
  }

  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(224,122,58,0.1);
    border: 1px solid rgba(224,122,58,0.25);
    border-radius: 100px;
    padding: 6px 16px;
    font-size: 12px;
    font-weight: 600;
    color: var(--orange-dark);
    letter-spacing: 0.5px;
    text-transform: uppercase;
    margin-bottom: 24px;
    animation: fadeUp 0.6s ease both;
  }

  .hero-badge-dot {
    width: 7px; height: 7px;
    background: var(--orange);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(1.3); }
  }

  .hero-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(38px, 5vw, 60px);
    font-weight: 700;
    line-height: 1.12;
    letter-spacing: -1px;
    color: var(--text);
    margin-bottom: 20px;
    animation: fadeUp 0.6s 0.1s ease both;
  }

  .hero-title span { color: var(--orange); }

  .hero-subtitle {
    font-size: clamp(16px, 1.8vw, 18px);
    color: var(--gray-600);
    line-height: 1.7;
    max-width: 480px;
    margin-bottom: 36px;
    animation: fadeUp 0.6s 0.2s ease both;
  }

  .hero-actions {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    animation: fadeUp 0.6s 0.3s ease both;
  }

  .btn-primary {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--orange);
    color: white;
    padding: 14px 28px;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    text-decoration: none;
    border: none;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
    box-shadow: 0 4px 20px rgba(224,122,58,0.3);
  }

  .btn-primary:hover {
    background: var(--orange-dark);
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(224,122,58,0.4);
  }

  .btn-secondary {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: transparent;
    color: var(--teal);
    padding: 14px 28px;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    text-decoration: none;
    border: 2px solid var(--teal);
    cursor: pointer;
    transition: background 0.2s, color 0.2s, transform 0.15s;
  }

  .btn-secondary:hover {
    background: var(--teal);
    color: white;
    transform: translateY(-2px);
  }

  .hero-stats {
    display: flex;
    gap: 32px;
    margin-top: 48px;
    padding-top: 32px;
    border-top: 1px solid var(--gray-200);
    animation: fadeUp 0.6s 0.4s ease both;
  }

  .hero-stat-num {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 700;
    color: var(--orange);
    display: block;
    line-height: 1;
    margin-bottom: 4px;
  }

  .hero-stat-label {
    font-size: 12px;
    color: var(--gray-400);
    font-weight: 500;
    letter-spacing: 0.3px;
  }

  /* ── HERO VISUAL ── */
  .hero-visual {
    position: relative;
    animation: fadeUp 0.7s 0.2s ease both;
  }

  .hero-card {
    background: white;
    border-radius: 20px;
    padding: 28px;
    box-shadow: 0 24px 64px rgba(30,20,10,0.12), 0 4px 16px rgba(30,20,10,0.06);
    position: relative;
    overflow: hidden;
  }

  .hero-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--orange), var(--teal));
  }

  .hc-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .hc-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--gray-400);
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }

  .hc-status {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    font-weight: 600;
    color: #22a853;
    background: rgba(34,168,83,0.1);
    padding: 4px 10px;
    border-radius: 100px;
  }

  .hc-status-dot {
    width: 6px; height: 6px;
    background: #22a853;
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  .hc-metrics {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 20px;
  }

  .hc-metric {
    background: var(--cream);
    border-radius: 12px;
    padding: 14px 16px;
  }

  .hc-metric-icon {
    font-size: 20px;
    margin-bottom: 8px;
    display: block;
  }

  .hc-metric-val {
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
    margin-bottom: 2px;
    font-family: 'Playfair Display', serif;
  }

  .hc-metric-label {
    font-size: 11px;
    color: var(--gray-400);
    font-weight: 500;
  }

  .hc-bar-section { margin-bottom: 20px; }

  .hc-bar-label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    font-weight: 500;
    color: var(--gray-600);
    margin-bottom: 6px;
  }

  .hc-bar-track {
    height: 8px;
    background: var(--gray-100);
    border-radius: 100px;
    overflow: hidden;
  }

  .hc-bar-fill {
    height: 100%;
    border-radius: 100px;
    background: linear-gradient(90deg, var(--orange), var(--orange-light));
    animation: barGrow 1.5s 0.8s ease both;
    transform-origin: left;
  }

  .hc-bar-fill.teal {
    background: linear-gradient(90deg, var(--teal), var(--teal-light));
  }

  @keyframes barGrow {
    from { transform: scaleX(0); }
    to { transform: scaleX(1); }
  }

  .hc-footer {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 16px;
    background: rgba(43,107,94,0.07);
    border-radius: 10px;
    font-size: 12px;
    color: var(--teal-dark);
    font-weight: 500;
  }

  .floating-tag {
    position: absolute;
    background: white;
    border-radius: 12px;
    padding: 10px 14px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    font-size: 12px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
    animation: float 3s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  .ft-1 { top: -16px; right: 20px; animation-delay: 0s; }
  .ft-2 { bottom: -16px; left: 10px; animation-delay: 1.2s; }

  .ft-dot { width: 8px; height: 8px; border-radius: 50%; }
  .ft-dot.orange { background: var(--orange); }
  .ft-dot.green { background: #22a853; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── SECTION SHARED ── */
  section { padding: 96px 5%; }

  .section-inner {
    max-width: 1200px;
    margin: 0 auto;
  }

  .section-label {
    display: inline-block;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--orange);
    margin-bottom: 12px;
  }

  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(30px, 4vw, 46px);
    font-weight: 700;
    line-height: 1.18;
    letter-spacing: -0.8px;
    color: var(--text);
    margin-bottom: 16px;
  }

  .section-subtitle {
    font-size: 17px;
    color: var(--gray-600);
    max-width: 540px;
    line-height: 1.7;
  }

  /* ── LOGOS / SOCIAL PROOF STRIP ── */
  .proof-strip {
    background: white;
    border-top: 1px solid var(--gray-200);
    border-bottom: 1px solid var(--gray-200);
    padding: 32px 5%;
  }

  .proof-strip-inner {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 40px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .proof-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--gray-400);
    letter-spacing: 0.5px;
    white-space: nowrap;
  }

  .proof-logos {
    display: flex;
    align-items: center;
    gap: 40px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .proof-logo {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--gray-200);
    letter-spacing: -0.3px;
    transition: color 0.2s;
    filter: grayscale(1) opacity(0.35);
    white-space: nowrap;
  }

  .proof-logo:hover { filter: grayscale(0) opacity(1); }

  /* ── FEATURES ── */
  .features { background: var(--cream); }

  .features-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 24px;
    margin-top: 56px;
  }

  .feature-card {
    background: white;
    border-radius: 16px;
    padding: 32px;
    border: 1px solid var(--gray-200);
    transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
    position: relative;
    overflow: hidden;
  }

  .feature-card::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--orange), var(--teal));
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.3s ease;
  }

  .feature-card:hover {
    transform: translateY(-6px);
    box-shadow: 0 20px 48px rgba(30,20,10,0.1);
    border-color: rgba(224,122,58,0.2);
  }

  .feature-card:hover::after { transform: scaleX(1); }

  .feature-icon {
    font-size: 36px;
    margin-bottom: 16px;
    display: block;
    line-height: 1;
  }

  .feature-title {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 10px;
    line-height: 1.3;
  }

  .feature-desc {
    font-size: 15px;
    color: var(--gray-600);
    line-height: 1.65;
  }

  /* ── HOW IT WORKS ── */
  .how { background: white; }

  .how-steps {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 40px;
    margin-top: 64px;
    position: relative;
  }

  .how-steps::before {
    content: '';
    position: absolute;
    top: 30px;
    left: calc(16.6% + 24px);
    right: calc(16.6% + 24px);
    height: 2px;
    background: linear-gradient(90deg, var(--orange), var(--teal));
    z-index: 0;
  }

  .how-step {
    text-align: center;
    position: relative;
    z-index: 1;
  }

  .how-step-num {
    width: 60px; height: 60px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 700;
    margin: 0 auto 24px;
    position: relative;
    z-index: 2;
  }

  .how-step:nth-child(1) .how-step-num {
    background: var(--orange);
    color: white;
    box-shadow: 0 8px 24px rgba(224,122,58,0.35);
  }

  .how-step:nth-child(2) .how-step-num {
    background: white;
    color: var(--orange);
    border: 2.5px solid var(--orange);
  }

  .how-step:nth-child(3) .how-step-num {
    background: var(--teal);
    color: white;
    box-shadow: 0 8px 24px rgba(43,107,94,0.35);
  }

  .how-step-emoji {
    font-size: 24px;
    margin-bottom: 12px;
    display: block;
  }

  .how-step-title {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 10px;
    line-height: 1.3;
  }

  .how-step-desc {
    font-size: 15px;
    color: var(--gray-600);
    line-height: 1.65;
    max-width: 260px;
    margin: 0 auto;
  }

  /* ── TESTIMONIALS ── */
  .testimonials { background: var(--teal); }

  .testimonials .section-label { color: rgba(255,255,255,0.6); }
  .testimonials .section-title { color: white; }

  .testimonials-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 24px;
    margin-top: 56px;
  }

  .testimonial-card {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 16px;
    padding: 28px;
    transition: background 0.25s, transform 0.25s;
  }

  .testimonial-card:hover {
    background: rgba(255,255,255,0.14);
    transform: translateY(-4px);
  }

  .tc-stars {
    font-size: 16px;
    margin-bottom: 16px;
    letter-spacing: 2px;
  }

  .tc-quote {
    font-size: 15px;
    color: rgba(255,255,255,0.88);
    line-height: 1.7;
    margin-bottom: 20px;
    font-style: italic;
  }

  .tc-author {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .tc-avatar {
    width: 42px; height: 42px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    background: rgba(255,255,255,0.15);
    flex-shrink: 0;
  }

  .tc-name {
    font-weight: 600;
    font-size: 14px;
    color: white;
    margin-bottom: 2px;
  }

  .tc-role {
    font-size: 12px;
    color: rgba(255,255,255,0.55);
  }

  /* ── SOCIAL PROOF NUMBERS ── */
  .numbers { background: var(--cream); }

  .numbers-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    background: var(--gray-200);
    border-radius: 20px;
    overflow: hidden;
    margin-top: 56px;
  }

  .number-item {
    background: white;
    padding: 40px 32px;
    text-align: center;
  }

  .number-val {
    font-family: 'Playfair Display', serif;
    font-size: 48px;
    font-weight: 700;
    color: var(--orange);
    line-height: 1;
    margin-bottom: 8px;
    display: block;
  }

  .number-label {
    font-size: 14px;
    color: var(--gray-600);
    font-weight: 500;
    line-height: 1.4;
  }

  /* ── CTA / WAITLIST ── */
  .waitlist {
    background: linear-gradient(135deg, var(--orange) 0%, var(--orange-dark) 100%);
    position: relative;
    overflow: hidden;
  }

  .waitlist::before {
    content: '';
    position: absolute;
    top: -100px; right: -100px;
    width: 400px; height: 400px;
    background: rgba(255,255,255,0.06);
    border-radius: 50%;
    pointer-events: none;
  }

  .waitlist::after {
    content: '';
    position: absolute;
    bottom: -80px; left: -80px;
    width: 300px; height: 300px;
    background: rgba(0,0,0,0.06);
    border-radius: 50%;
    pointer-events: none;
  }

  .waitlist-inner {
    max-width: 640px;
    margin: 0 auto;
    text-align: center;
    position: relative;
    z-index: 1;
  }

  .waitlist .section-label { color: rgba(255,255,255,0.7); }

  .waitlist .section-title {
    color: white;
    margin-bottom: 14px;
  }

  .waitlist-sub {
    font-size: 17px;
    color: rgba(255,255,255,0.82);
    line-height: 1.65;
    margin-bottom: 40px;
  }

  .waitlist-form {
    display: flex;
    gap: 12px;
    max-width: 520px;
    margin: 0 auto 16px;
  }

  .waitlist-input {
    flex: 1;
    padding: 14px 20px;
    border-radius: 10px;
    border: 2px solid rgba(255,255,255,0.3);
    background: rgba(255,255,255,0.15);
    color: white;
    font-size: 15px;
    font-family: 'Inter', sans-serif;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
    backdrop-filter: blur(4px);
  }

  .waitlist-input::placeholder { color: rgba(255,255,255,0.6); }

  .waitlist-input:focus {
    border-color: rgba(255,255,255,0.7);
    background: rgba(255,255,255,0.22);
  }

  .waitlist-btn {
    background: white;
    color: var(--orange-dark);
    padding: 14px 28px;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 700;
    border: none;
    cursor: pointer;
    white-space: nowrap;
    transition: transform 0.15s, box-shadow 0.2s;
    font-family: 'Inter', sans-serif;
    box-shadow: 0 4px 16px rgba(0,0,0,0.15);
  }

  .waitlist-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.2);
  }

  .waitlist-note {
    font-size: 13px;
    color: rgba(255,255,255,0.6);
  }

  .waitlist-note strong { color: rgba(255,255,255,0.85); }

  /* ── FOOTER ── */
  footer {
    background: var(--gray-800);
    padding: 56px 5% 32px;
  }

  .footer-inner {
    max-width: 1200px;
    margin: 0 auto;
  }

  .footer-top {
    display: grid;
    grid-template-columns: 2fr 1fr 1fr 1fr;
    gap: 48px;
    padding-bottom: 48px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }

  .footer-brand-logo {
